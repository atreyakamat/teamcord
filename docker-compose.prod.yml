# TeamCord Production Override
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ─── Reverse Proxy ─────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    depends_on:
      - api
      - web
      - gateway
    networks:
      - teamcord

  # ─── API Service ───────────────────────────────────────────────────────────
  api:
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MEILISEARCH_URL=${MEILISEARCH_URL:-http://meilisearch:7700}
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-teamcord}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET:-teamcord-files}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Gateway Service ───────────────────────────────────────────────────────
  gateway:
    environment:
      - NODE_ENV=production
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Web Frontend ──────────────────────────────────────────────────────────
  web:
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL}/api/v1
      - NEXT_PUBLIC_WS_URL=${WS_URL}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Voice Service ─────────────────────────────────────────────────────────
  voice:
    environment:
      - NODE_ENV=production
      - NATS_URL=${NATS_URL:-nats://nats:4222}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    # WebRTC requires these ports
    ports:
      - "10000-10100:10000-10100/udp"

  # ─── AI Agent ──────────────────────────────────────────────────────────────
  ai-agent:
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - API_URL=http://api:3001/api/v1
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Database ──────────────────────────────────────────────────────────────
  postgres:
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcord"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ─── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-teamcord}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── NATS ──────────────────────────────────────────────────────────────────
  nats:
    volumes:
      - ./data/nats:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ─── Meilisearch ───────────────────────────────────────────────────────────
  meilisearch:
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY}
      - MEILI_ENV=production
    volumes:
      - ./data/meilisearch:/meili_data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Ollama (optional, for community edition) ──────────────────────────────
  ollama:
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    # GPU support (uncomment if available)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

networks:
  teamcord:
    driver: bridge
