<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamCord - No Connection</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Sans", sans-serif;
        background: radial-gradient(circle at top, #1d4f56 0%, #10292f 44%, #0b1c20 100%);
        color: #f6efe5;
      }
      .card {
        width: min(560px, calc(100% - 2rem));
        border-radius: 24px;
        border: 1px solid rgba(246, 239, 229, 0.16);
        background: rgba(8, 22, 25, 0.82);
        padding: 2rem;
      }
      h1 {
        margin: 0;
        font-size: 2rem;
      }
      p {
        margin-top: 0.9rem;
        line-height: 1.6;
        color: #bed2ce;
      }
      button {
        margin-top: 1rem;
        border: 0;
        border-radius: 999px;
        background: #ff7a18;
        color: #10292f;
        font-weight: 700;
        padding: 0.7rem 1.2rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>No Connection</h1>
      <p>TeamCord is offline right now. Reconnect to sync messages, channels, and workspace updates.</p>
      <button onclick="location.reload()">Try Again</button>
    </main>
  </body>
</html>
