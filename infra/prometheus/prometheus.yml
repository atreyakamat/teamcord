# Prometheus Configuration for TeamCord
# Scrape configs for all TeamCord services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'teamcord'

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # TeamCord API
  - job_name: 'teamcord-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: /metrics
    scrape_interval: 10s

  # TeamCord Gateway
  - job_name: 'teamcord-gateway'
    static_configs:
      - targets: ['gateway:3002']
    metrics_path: /metrics
    scrape_interval: 10s

  # TeamCord Voice
  - job_name: 'teamcord-voice'
    static_configs:
      - targets: ['voice:3004']
    metrics_path: /metrics
    scrape_interval: 10s

  # AI Agent
  - job_name: 'teamcord-ai-agent'
    static_configs:
      - targets: ['ai-agent:3005']
    metrics_path: /metrics
    scrape_interval: 30s

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # NATS
  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: /metrics
    scrape_interval: 15s

  # Meilisearch
  - job_name: 'meilisearch'
    static_configs:
      - targets: ['meilisearch:7700']
    metrics_path: /metrics
    scrape_interval: 30s

  # MinIO
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: /minio/v2/metrics/cluster
    scrape_interval: 30s

  # Caddy
  - job_name: 'caddy'
    static_configs:
      - targets: ['caddy:2019']
    metrics_path: /metrics
    scrape_interval: 15s

  # Node Exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
