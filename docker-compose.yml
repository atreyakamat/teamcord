services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamcord
      POSTGRES_USER: teamcord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamcord_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcord -d teamcord"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teamcord-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: teamcord-nats
    restart: unless-stopped
    command: ["--js", "--sd=/data", "-m=8222"]
    volumes:
      - nats_data:/data
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: teamcord-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-teamcord_meili_key}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: teamcord-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-teamcord}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-teamcord_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: teamcord-keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-teamcord_admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/teamcord
      KC_DB_USERNAME: teamcord
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-teamcord_secret}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: teamcord-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  searxng:
    image: searxng/searxng:latest
    container_name: teamcord-searxng
    restart: unless-stopped
    volumes:
      - ./infra/searxng:/etc/searxng:rw
    ports:
      - "8081:8080"

  # ─── TeamCord Services ──────────────────────────────────────────────────────

  gateway:
    build:
      context: services/gateway
      dockerfile: Dockerfile
    container_name: teamcord-gateway
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  messaging:
    build:
      context: services/messaging
      dockerfile: Dockerfile
    container_name: teamcord-messaging
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://teamcord:${POSTGRES_PASSWORD:-teamcord_secret}@postgres:5432/teamcord?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILI_MASTER_KEY:-teamcord_meili_key}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  voice:
    build:
      context: services/voice
      dockerfile: Dockerfile
    container_name: teamcord-voice
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      RTC_MIN_PORT: 11000
      RTC_MAX_PORT: 11000
      ANNOUNCED_IP: ${ANNOUNCED_IP:-127.0.0.1}
    ports:
      - "3004:3004"
      - "11000:11000/udp"
    depends_on:
      nats:
        condition: service_healthy

  ai-agent:
    build:
      context: services/ai-agent
      dockerfile: Dockerfile
    container_name: teamcord-ai-agent
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      NATS_URL: nats://nats:4222
      SEARXNG_URL: http://searxng:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - ollama
      - nats
      - searxng

  files:
    build:
      context: services/files
      dockerfile: Dockerfile
    container_name: teamcord-files
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: teamcord-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-teamcord}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-teamcord_secret}
    depends_on:
      minio:
        condition: service_healthy

  # ─── Apps ───────────────────────────────────────────────────────────────────

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: teamcord-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_GATEWAY_URL: ws://localhost:3002
    ports:
      - "${WEB_PORT:-3010}:3000"

  # ─── Observability ──────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: teamcord-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: teamcord-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3005:3000"
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: teamcord-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

volumes:
  postgres_data:
  redis_data:
  nats_data:
  meilisearch_data:
  minio_data:
  ollama_data:
  grafana_data:
  caddy_data:
  caddy_config:
