services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamcord
      POSTGRES_USER: teamcord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamcord_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcord -d teamcord"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (pub/sub + cache) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3-compatible file storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-teamcord}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-teamcord_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Ollama (self-hosted LLM for AI agent) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── API server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://teamcord:${POSTGRES_PASSWORD:-teamcord_secret}@postgres:5432/teamcord
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      PORT: 3001
      HOST: 0.0.0.0
      NODE_ENV: production
      CORS_ORIGIN: ${APP_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Gateway (WebSocket) ─────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      GATEWAY_PORT: 3002
      HOST: 0.0.0.0
      NODE_ENV: production
    ports:
      - "${GATEWAY_PORT:-3002}:3002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health || true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── AI Agent ─────────────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      AGENT_PORT: 3003
      HOST: 0.0.0.0
      NODE_ENV: production
      CORS_ORIGIN: ${APP_URL:-http://localhost:3000}
    ports:
      - "${AGENT_PORT:-3003}:3003"
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
      NEXT_PUBLIC_GATEWAY_URL: ${GATEWAY_URL:-ws://localhost:3002}
      NEXT_PUBLIC_AGENT_URL: ${AGENT_URL:-http://localhost:3003}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
